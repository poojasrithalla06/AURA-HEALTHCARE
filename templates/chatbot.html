{% extends 'base.html' %}

{% block content %}
<div class="row" style="display: flex; gap: 2rem; justify-content: center; padding: 2rem;">
    <div class="col-8 glass-card" style="flex: 2; height: 80vh; display: flex; flex-direction: column; background: var(--bg-card); border-radius: var(--radius-premium); box-shadow: var(--shadow-premium); overflow: hidden; padding: 0;">
        
        <!-- Header -->
        <div style="background: var(--primary-color); padding: 1.5rem; text-align: center; color: white;">
            <h2 style="margin: 0; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i class="fas fa-robot"></i> Aura AI Assistant
            </h2>
            <p style="margin: 0.5rem 0 0 0; font-size: 0.9rem; opacity: 0.9;">Powered by Local LLM</p>
        </div>

        <!-- Chat Window -->
        <div class="chat-window" id="chatWindow" style="flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; background: var(--secondary-color); border: none; height: auto;">
            <div class="bot-msg-dynamic">
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem;">
                    <i class="fas fa-robot" style="color: var(--primary-color);"></i>
                    <strong style="font-size: 0.85rem; color: var(--primary-color);">Aura AI</strong>
                </div>
                <span>Hello! I am Aura. How can I assist you with your health today?</span>
            </div>
            <!-- Messages added here -->
        </div>

        <!-- Input Area Options -->
        <div style="padding: 0.5rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border-top: 1px solid var(--border-color);">
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <button id="voiceToggleBtn" style="padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--secondary-color); color: var(--text-main); font-size: 0.85rem; cursor: pointer; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s;">
                    <i class="fas fa-volume-up"></i> <span>Voice On</span>
                </button>
            </div>
            <div id="listeningIndicator" style="display: none; align-items: center; gap: 0.5rem; color: #ef4444; font-size: 0.85rem; font-weight: 600; animation: pulseRed 1.5s infinite;">
                <i class="fas fa-microphone-lines"></i> Listening...
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area" style="display: flex; gap: 0.75rem; align-items: center; padding: 0.5rem 1.5rem 1rem 1.5rem; background: var(--bg-card);">
            <select id="chatLangSelect" style="padding: 0.7rem 0.5rem; border-radius: 12px; border: 1px solid var(--border-color); background: var(--secondary-color); color: var(--text-main); font-size: 0.85rem; outline: none; cursor: pointer; font-family: 'Outfit', sans-serif; min-width: 100px;">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Telugu">Telugu</option>
            </select>
            <div style="flex: 1; position: relative; display: flex; align-items: center;">
                <input type="text" id="aiChatInput" placeholder="Type your message..." style="width: 100%; padding: 0.875rem 1.25rem; border-radius: 2rem; border: 1px solid var(--border-color); outline: none; font-size: 0.95rem; background: var(--secondary-color); color: var(--text-main); transition: all 0.3s ease;">
            </div>
            <button id="aiMicBtn" title="Use Microphone" style="padding: 0; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f1f5f9; color: var(--primary-color); border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s;"><i class="fas fa-microphone"></i></button>
            <button id="aiSendBtn" class="cta-btn" style="padding: 0; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="fas fa-paper-plane"></i></button>
        </div>
        
        <!-- Feedback Trigger -->
        <div style="text-align: center; margin: 0.5rem 0 1rem 0;">
            <p style="font-size: 0.85rem; color: #777; margin: 0;">Was this advice helpful?
                <button onclick="openFeedback(true)" style="border:none; background:none; color:green; cursor:pointer;"><i class="fas fa-thumbs-up"></i></button>
                <button onclick="openFeedback(false)" style="border:none; background:none; color:red; cursor:pointer;"><i class="fas fa-thumbs-down"></i></button>
            </p>
        </div>
    </div>
</div>

<!-- Feedback Modal -->
<div id="feedbackModal" class="glass-card" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; width: 400px; padding: 2rem;">
    <h3 style="color: var(--primary-color); margin-bottom: 1rem;">Improve Aura AI</h3>
    <p id="feedbackTitle" style="margin-bottom: 1rem; font-weight: bold;"></p>
    <textarea id="feedbackComment" placeholder="What can we improve? (Optional)" style="width: 100%; height: 100px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; margin-bottom: 1rem;"></textarea>
    <div style="display: flex; gap: 1rem;">
        <button onclick="submitFeedback()" class="cta-btn" style="flex:1;">Submit</button>
        <button onclick="closeFeedback()" class="cta-btn" style="flex:1; background:#ccc; color:#333;">Cancel</button>
    </div>
</div>

<style>
/* Dynamic Chat UI Styles */
.user-msg-dynamic {
    align-self: flex-end;
    background: var(--primary-color);
    color: white;
    border-bottom-right-radius: 4px;
    padding: 0.8rem 1.2rem;
    border-radius: 20px 20px 4px 20px;
    max-width: 75%;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    animation: slideInRight 0.3s ease;
    word-wrap: break-word;
}

.bot-msg-dynamic {
    align-self: flex-start;
    background: var(--bg-card);
    color: var(--text-main);
    border-bottom-left-radius: 4px;
    padding: 0.8rem 1.2rem;
    border-radius: 20px 20px 20px 4px;
    max-width: 75%;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    animation: slideInLeft 0.3s ease;
    word-wrap: break-word;
}

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

input#aiChatInput:focus {
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    border-color: var(--primary-color) !important;
}

/* Typing Animation */
.typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 0.5rem 0;
}

.typing-dots span {
    width: 6px;
    height: 6px;
    background-color: var(--primary-color);
    border-radius: 50%;
    animation: blink 1.4s infinite both;
}

.typing-dots span:nth-child(1) { animation-delay: 0.2s; }
.typing-dots span:nth-child(2) { animation-delay: 0.4s; }
.typing-dots span:nth-child(3) { animation-delay: 0.6s; }

@keyframes blink {
    0% { opacity: 0.2; transform: scale(0.8); }
    20% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0.2; transform: scale(0.8); }
}

@keyframes pulseRed {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
}

#aiMicBtn:hover {
    background: #e2e8f0 !important;
    transform: scale(1.05);
}
</style>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
{% endblock %}
