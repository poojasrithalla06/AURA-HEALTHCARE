{% extends 'base.html' %}

{% block title %}Security Synchronized - AuraHealth{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px; margin-top: 8rem;">
    <div class="card" style="padding: 5rem 4rem; background: #ffffff; border: 1px solid #f1f5f9; box-shadow: var(--shadow-premium); border-radius: 28px; text-align: center; position: relative; overflow: hidden;">
        <!-- Success Background Decor -->
        <div style="position: absolute; bottom: -50px; left: -50px; width: 160px; height: 160px; background: rgba(16, 185, 129, 0.04); border-radius: 50%; filter: blur(40px);"></div>
        
        <div style="width: 100px; height: 100px; background: #f0fdf4; border: 1px solid #dcfce7; border-radius: 25px; display: flex; align-items: center; justify-content: center; color: #10b981; margin: 0 auto 3rem; font-size: 3rem; box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.2);">🛡️</div>
        
        <h2 style="font-family: 'Outfit'; font-size: 3.25rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.06em; margin-bottom: 1.5rem;">Security Synchronized</h2>
        <p style="color: var(--text-muted); font-size: 1.35rem; line-height: 1.7; font-weight: 500; max-width: 500px; margin: 0 auto 4rem auto;">Your administrative credentials have been successfully updated across the global AuraHealth neural network.</p>
        
        <div style="margin-top: 4rem;">
            <a href="{% url 'dashboard' %}" class="btn" style="border-radius: 16px; font-weight: 800; padding: 1.4rem 4rem; width: auto; display: inline-flex; font-size: 1.25rem; letter-spacing: 0.05em; box-shadow: 0 20px 40px -10px rgba(14, 165, 233, 0.35);">RESUME DASHBOARD</a>
        </div>
    </div>
</div>
{% endblock %}
